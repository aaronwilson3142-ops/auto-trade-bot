apiVersion: v1
kind: Service
metadata:
  name: apis-api-svc
  namespace: apis
  labels:
    app.kubernetes.io/name: apis
    app.kubernetes.io/component: api
spec:
  selector:
    app: apis-api
  type: ClusterIP          # internal only; expose externally via Ingress or LoadBalancer
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
# Optional: expose metrics port explicitly so Prometheus ServiceMonitor can target it
apiVersion: v1
kind: Service
metadata:
  name: apis-api-metrics-svc
  namespace: apis
  labels:
    app.kubernetes.io/name: apis
    app.kubernetes.io/component: api-metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: apis-api
  type: ClusterIP
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
      protocol: TCP
