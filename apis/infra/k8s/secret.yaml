# ─────────────────────────────────────────────────────────────────────────────
# APIS — Kubernetes Secret template
#
# IMPORTANT: This file is a TEMPLATE.  All values below are placeholder base64
# encodings of the string "REPLACE_ME".  You MUST replace every value before
# applying this manifest in any environment.
#
# How to encode a real secret value:
#   echo -n "your_real_value" | base64
#
# Apply with:
#   kubectl apply -f secret.yaml -n apis
#
# Production recommendation: do NOT store actual secrets in this file under
# source control.  Use one of the following approaches instead:
#   1. AWS Secrets Manager + external-secrets operator (preferred)
#   2. Sealed Secrets (kubeseal)
#   3. HashiCorp Vault + Vault Agent Injector
#   4. Manually inject via CI/CD pipeline (e.g. kubectl create secret)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: apis-secrets
  namespace: apis
  labels:
    app.kubernetes.io/name: apis
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # echo -n "your_postgres_password" | base64
  POSTGRES_PASSWORD: UkVQTEFDRV9NRQ==   # placeholder: REPLACE_ME

  # ── Full DB connection URL (overrides ConfigMap split approach) ────────────
  APIS_DB_URL: UkVQTEFDRV9NRQ==         # placeholder: REPLACE_ME

  # ── Alpaca paper credentials ───────────────────────────────────────────────
  ALPACA_API_KEY: UkVQTEFDRV9NRQ==
  ALPACA_API_SECRET: UkVQTEFDRV9NRQ==

  # ── Schwab credentials ─────────────────────────────────────────────────────
  SCHWAB_APP_KEY: UkVQTEFDRV9NRQ==
  SCHWAB_APP_SECRET: UkVQTEFDRV9NRQ==
  SCHWAB_TOKEN_PATH: UkVQTEFDRV9NRQ==   # path to schwab-py token JSON

  # ── IBKR TWS / IB Gateway ─────────────────────────────────────────────────
  IBKR_HOST: UkVQTEFDRV9NRQ==           # e.g. "127.0.0.1"
  IBKR_PORT: UkVQTEFDRV9NRQ==           # e.g. "7497" (TWS paper)
  IBKR_CLIENT_ID: UkVQTEFDRV9NRQ==

  # ── AWS (for AWSSecretManager + boto3) ────────────────────────────────────
  AWS_ACCESS_KEY_ID: UkVQTEFDRV9NRQ==
  AWS_SECRET_ACCESS_KEY: UkVQTEFDRV9NRQ==
  AWS_DEFAULT_REGION: dXMtZWFzdC0x       # placeholder: us-east-1

  # ── Admin / rotation hook ─────────────────────────────────────────────────
  APIS_ADMIN_ROTATION_TOKEN: UkVQTEFDRV9NRQ==  # random 32+ char token

  # ── Grafana ────────────────────────────────────────────────────────────────
  GRAFANA_ADMIN_PASSWORD: UkVQTEFDRV9NRQ==
