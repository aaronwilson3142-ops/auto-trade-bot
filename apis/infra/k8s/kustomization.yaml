apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ─────────────────────────────────────────────────────────────────────────────
# APIS — Kustomize root overlay
#
# Usage:
#   kubectl kustomize infra/k8s/ | kubectl apply -f -
#   # or with Kustomize 4+:
#   kubectl apply -k infra/k8s/
#
# Prerequisites:
#   kubectl, kustomize (or kubectl 1.14+)
#   Container images built and pushed to registry (update images[] below)
#
# Secret management:
#   Do NOT commit real values in secret.yaml.
#   Use secretGenerator with a .env file that is .gitignore'd, or use an
#   external secrets operator (AWS Secrets Manager / Sealed Secrets / Vault).
# ─────────────────────────────────────────────────────────────────────────────

namespace: apis

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - api-deployment.yaml
  - api-service.yaml
  - worker-deployment.yaml
  - hpa.yaml
  - network-policy.yaml

# Override container image tags here per environment:
images:
  - name: your-registry/apis
    newTag: latest           # pin to a sha256 digest in production
  # Note: apis-worker uses the same image as apis (different CMD only — no separate image)

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: autonomous-portfolio-intelligence-system
  environment: production
