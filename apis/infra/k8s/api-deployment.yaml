apiVersion: apps/v1
kind: Deployment
metadata:
  name: apis-api
  namespace: apis
  labels:
    app.kubernetes.io/name: apis
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apis-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # zero-downtime rolling deploys
  template:
    metadata:
      labels:
        app: apis-api
        app.kubernetes.io/name: apis
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # ── Security context ─────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # ── Init container: wait for DB ───────────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Waiting for postgres..."; sleep 2
              done
              echo "Postgres is ready."
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

      containers:
        - name: api
          image: your-registry/apis:latest   # replace with your container registry path
          imagePullPolicy: Always
          command: ["python", "-m", "uvicorn", "apps.api.main:app",
                    "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # ── Env from ConfigMap ──────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: apis-config
            - secretRef:
                name: apis-secrets

          # ── Security ────────────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # uvicorn writes access logs
            capabilities:
              drop: ["ALL"]

          # ── Resource limits ──────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ── Probes ─────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
