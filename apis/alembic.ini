[alembic]
# Path to migration scripts, relative to where alembic is invoked (apis/ root)
script_location = infra/db

# Prepend apis/ root to sys.path so config and infra packages are importable
prepend_sys_path = .

version_path_separator = os

# Placeholder URL — env.py overrides this from config.settings.get_settings().db_url
sqlalchemy.url = postgresql+psycopg://placeholder:placeholder@localhost:5432/apis

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
