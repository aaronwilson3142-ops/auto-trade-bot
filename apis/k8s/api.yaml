apiVersion: apps/v1
kind: Deployment
metadata:
  name: apis-api
  namespace: apis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apis-api
  template:
    metadata:
      labels:
        app: apis-api
    spec:
      containers:
        - name: api
          image: apis:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: APIS_ENV
              value: production
            - name: APIS_OPERATING_MODE
              value: paper
            - name: APIS_LOG_LEVEL
              value: INFO
            - name: APIS_MAX_POSITIONS
              value: "15"
            - name: APIS_REDIS_URL
              value: redis://redis-svc:6379/0
            - name: APIS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: apis-secrets
                  key: APIS_DB_URL
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: apis-secrets
                  key: ALPACA_API_KEY
            - name: ALPACA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: apis-secrets
                  key: ALPACA_API_SECRET
            - name: ALPACA_BASE_URL
              value: https://paper-api.alpaca.markets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: apis-api-svc
  namespace: apis
spec:
  type: NodePort
  selector:
    app: apis-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
