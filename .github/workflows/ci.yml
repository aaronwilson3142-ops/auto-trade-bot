name: APIS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --------------------------------------------------------------------------
  # Unit test suite + coverage enforcement (no external dependencies needed)
  # --------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: apis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apis/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: .
          APIS_DB_URL: postgresql+psycopg://apis:apis_test@localhost:5432/apis
          APIS_ENV: development
        run: |
          python -m pytest tests/unit/ -q --tb=short \
            --cov=. --cov-report=term-missing --cov-config=pyproject.toml

  # --------------------------------------------------------------------------
  # Lint — ruff (blocking) + mypy (type check, informational)
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apis/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint (blocking)
        run: |
          python -m ruff check .

      - name: Mypy type check (informational)
        run: |
          python -m mypy . || true
        # NOTE: mypy strict errors are tracked but do not block CI while the
        # codebase is being annotated incrementally. Remove `|| true` once
        # zero mypy errors are achieved.

  # --------------------------------------------------------------------------
  # Integration tests — with Postgres service container
  # --------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apis

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: apis
          POSTGRES_PASSWORD: apis_test
          POSTGRES_DB: apis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apis/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          PYTHONPATH: .
          APIS_DB_URL: postgresql+psycopg://apis:apis_test@localhost:5432/apis_test
          APIS_REDIS_URL: redis://localhost:6379/0
          APIS_ENV: development
        run: |
          python -m pytest tests/integration/ -v --no-cov --tb=short

  # --------------------------------------------------------------------------
  # Docker build verification (api + worker targets)
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apis/infra/docker/Dockerfile
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apis/infra/docker/Dockerfile
          target: worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
