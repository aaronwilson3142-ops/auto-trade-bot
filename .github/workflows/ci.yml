name: APIS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --------------------------------------------------------------------------
  # Unit test suite (no external dependencies needed)
  # --------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: apis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apis/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
          APIS_DB_URL: postgresql+psycopg://apis:apis_test@localhost:5432/apis
          APIS_ENV: development
        run: |
          python -m pytest tests/unit/ --no-cov -q --tb=short

  # --------------------------------------------------------------------------
  # Lint / type checks (informational, non-blocking)
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apis/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff || true

      - name: Ruff lint (warnings only)
        run: |
          python -m ruff check . --exit-zero || true

  # --------------------------------------------------------------------------
  # Docker build verification (api + worker targets)
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apis/infra/docker/Dockerfile
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apis/infra/docker/Dockerfile
          target: worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
